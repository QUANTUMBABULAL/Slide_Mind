<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SlideMind</title>
    <style>
      body {
        margin: 0;
        padding: 16px;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        background: #0f1115;
        color: #e6e8ef;
        min-width: 220px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 16px;
      }
      p {
        margin: 0 0 12px;
        font-size: 12px;
        color: #9aa3b2;
      }
      button {
        width: 100%;
        border: none;
        border-radius: 8px;
        padding: 8px 10px;
        background: #2e5cff;
        color: #f8f9ff;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>SlideMind</h1>
    <p>Open ChatGPT to launch the study panel.</p>
    <button id="open-chatgpt" type="button">Open chatgpt.com</button>
    <script src="popup.js"></script>
  </body>
</html>
